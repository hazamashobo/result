<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索結果 | 狭間書房</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    body {
      background-color: #111;
      color: #f5f5f5;
      font-family: "Hiragino Mincho ProN", "MS Mincho", serif;
      line-height: 1.8;
    }

    /* ヘッダー */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1em 2em;
      background-color: #666;
      color: #fff;
      flex-shrink: 0;
      gap: 2em;
      box-sizing: border-box;
      width: 100%;
    }
    .title-wrapper {
      display: flex;
      flex-direction: column;
    }
    .title-wrapper a {
      text-decoration: none;
      color: #fff;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }
    .title-wrapper a:hover h1 {
      opacity: 0.8;
      transition: opacity 0.3s ease;
    }
    header h1 {
      margin: 0;
      font-size: 3em;
      letter-spacing: 0.1em;
      line-height: 1;
      border: none;
      font-family: "Hiragino Mincho ProN", "MS Mincho", serif;
      font-weight: 700;
    }
    .subtitle {
      margin: 0;
      padding: 0;
      line-height: 1;
      font-size: 1em;
      text-align: center;
      color: #fff;
    }

    /* 検索 */
    .search {
      display: flex;
      align-items: center;
      gap: 0.5em;
      flex-shrink: 0;
      margin-left: auto;
    }
    .search form {
      display: flex;
      align-items: center;
      gap: 0.5em;
    }
    .search input {
      padding: 4px;
      border: 2px solid #333;
      border-radius: 4px;
      width: 150px;
      background-color: #fff;
      color: #333;
    }
    .search input::placeholder {
      color: #333aa;
    }
    .search button {
      padding: 4px 6px;
      border-radius: 4px;
      border: none;
      background-color: #333;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search button:hover {
      background-color: #222;
    }

    /* ナビゲーション */
    nav {
      text-align: center;
      padding: 1em 0;
      background-color: #f0f0f0;
      flex-shrink: 0;
      overflow-x: auto;
      box-sizing: border-box;
      width: 100%;
    }
    nav a {
      color: #003366;
      margin: 0 1em;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      white-space: nowrap;
    }
    nav a:hover {
      color: #666;
    }
    nav a.active {
      color: #666;
      border-bottom: 2px solid #666;
    }

    /* メインコンテンツ */
    main {
      flex: 1;
      max-width: 1200px;
      margin: 2em auto;
      padding: 0 2em;
      width: 100%;
      box-sizing: border-box;
    }

    main h1 {
      color: #f5f5f5;
      font-size: 2em;
      margin-bottom: 1em;
    }

    /* 検索結果表示 */
    .result-info {
      margin-bottom: 2em;
      font-size: 1.1em;
      color: #f5f5f5;
      padding: 0;
      background-color: transparent;
      border-left: none;
      border-radius: 0;
    }

    .result-list {
      max-width: 700px;
    }

    .result-item {
      margin: 1em 0;
      padding: 1.2em;
      border: none;
      border-bottom: 1px solid #333;
      border-radius: 0;
      background-color: transparent;
    }

    .result-item a {
      color: #f5f5f5;
      text-decoration: none;
      font-size: 1.1em;
      font-weight: bold;
      display: inline-block;
    }

    /* フッター */
    footer {
      background-color: #666;
      color: #ffffff;
      text-align: center;
      padding: 1em;
      flex-shrink: 0;
      margin-top: auto;
      box-sizing: border-box;
      width: 100%;
    }

    /* レスポンシブ */
    @media (max-width: 768px) {
      header {
        padding: 1em;
        justify-content: center;
        text-align: center;
        flex-wrap: wrap;
        gap: 1em;
      }

      header h1 {
        font-size: 2em;
      }

      .title-wrapper {
        width: 100%;
      }

      .search {
        width: 100%;
      }

      .search form {
        width: 100%;
        display: flex;
      }

      .search input {
        width: 100%;
        flex: 1;
      }

      nav a {
        margin: 0 0.5em;
        font-size: 0.9em;
      }

      main {
        padding: 0 1em;
        margin: 1em auto;
      }

      main h1 {
        font-size: 1.5em;
      }

      .result-info {
        font-size: 1em;
        padding: 0.8em;
      }

      .result-item {
        padding: 0.8em;
        margin: 0.8em 0;
      }

      .result-item a {
        font-size: 1em;
      }
    }

    @media (max-width: 480px) {
      header {
        flex-direction: column;
        gap: 0.5em;
      }

      header h1 {
        font-size: 1.5em;
      }

      .subtitle {
        font-size: 0.9em;
      }

      .search {
        width: 100%;
      }

      .search input {
        width: 100%;
        padding: 0.5em;
      }

      .search button {
        padding: 0.5em 0.8em;
        font-size: 0.9em;
      }

      nav a {
        margin: 0 0.3em;
        font-size: 0.8em;
      }

      main {
        padding: 0 0.8em;
        margin: 0.8em auto;
      }

      main h1 {
        font-size: 1.3em;
        margin-bottom: 0.8em;
      }

      .result-info {
        font-size: 0.95em;
        padding: 0.8em;
        margin-bottom: 1.5em;
      }

      .result-item {
        padding: 0.7em;
        margin: 0.7em 0;
      }

      .result-item a {
        font-size: 0.95em;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-wrapper">
      <a href="https://hazamashobo.github.io/main/index.html">
        <h1>狭間書房</h1>
        <p class="subtitle">Hazama Publishing</p>
      </a>
    </div>
    <div class="search">
      <form action="https://hazamashobo.github.io/result/" method="get">
        <input type="text" id="searchInput" name="q" placeholder="キーワード入力">
        <button type="submit">検索</button>
      </form>
    </div>
  </header>

  <nav>
    <a href="https://hazamashobo.github.io/main/index.html">ホーム</a>
    <a href="https://hazamashobo.github.io/company/index.html">狭間書房について</a>
    <a href="https://hazamashobo.github.io/books/index.html">刊行物</a>
    <a href="https://hazamashobo.github.io/contact/index.html">お問い合わせ</a>
  </nav>

  <main>
    <h1>検索結果</h1>
    <div id="result" class="result-info"></div>
    <div id="resultList" class="result-list"></div>
  </main>

  <footer>
    <p>© 2025 狭間書房</p>
  </footer>

<script>
  // 🔹 検索対象データ（表示名＝漢字、keywords＝検索用）
  const pages = [
    {
      display: "社員名簿",
      keywords: ["社員名簿", "meibo"],
      url: "https://hazamashobo.github.io/meibo2/index.html"
    },
    {
      display: "マイページ",
      keywords: ["マイページ", "mypage"],
      url: "https://hazamashobo.github.io/mypage/index.html"
    },

    {
      display: "桐須瑛人",
      keywords: ["桐須瑛人", "kirisueito", "kirisu"],
      url: "https://hazamashobo.github.io/kirisu/index.html"
    },
    {
      display: "薮翔子",
      keywords: ["薮翔子", "yabushouko", "yabu"],
      url: "https://hazamashobo.github.io/yabu/index.html"
    },
    {
      display: "鳥羽舞",
      keywords: ["鳥羽舞", "tobamai", "toba"],
      url: "https://hazamashobo.github.io/toba/index.html"
    },
    {
      display: "立城順平",
      keywords: ["立城順平", "tateshirojunpei", "tateshiro"],
      url: "https://hazamashobo.github.io/tateshiro/index.html"
    },
    {
      display: "佐久間大晴",
      keywords: ["佐久間大晴", "sakumataisei", "sakuma"],
      url: "https://hazamashobo.github.io/sakuma/index.html"
    },
    {
      display: "安藤玲香",
      keywords: ["安藤玲香", "andoureika", "ando"],
      url: "https://hazamashobo.github.io/obuchi/index.html"
    },
    {
      display: "大渕航也",
      keywords: ["大渕航也", "oobuchikouya", "obuchi"],
      url: "https://hazamashobo.github.io/ando/index.html"
    },
    {
      display: "外山昴",
      keywords: ["外山昴", "toyamasubaru", "toyama"],
      url: "https://hazamashobo.github.io/toyama/index.html"
    },
    {
      display: "福井里帆",
      keywords: ["福井里帆", "fukuiriho", "fukui"],
      url: "https://hazamashobo.github.io/hukui/index.html"
    },
    {
      display: "マイページについて",
      keywords: ["福井里帆", "fukuiriho", "fukui"],
      url: "https://hazamashobo.github.io/aboutmypage/index.html"
    },
    {
      display: "湯田伊織",
      keywords: ["湯田伊織", "yudaiori", "yuda"],
      url: "https://hazamashobo.github.io/yuda/index.html"
    },
    {
      display: "赤羽義人",
      keywords: ["赤羽義人", "akahaneyoshito", "akahane"],
      url: "https://hazamashobo.github.io/akahane/index.html"
    },
    {
      display: "下野凛",
      keywords: ["下野凛", "shimonorin", "shimono"],
      url: "https://hazamashobo.github.io/shimono/index.html"
    },
    {
      display: "堀北大樹",
      keywords: ["堀北大樹", "horikitadaiki", "horikita"],
      url: "https://hazamashobo.github.io/horikita/index.html"
    },

    {
      display: "ゴルゴタの丘 (カルワリオの丘)",
      keywords: ["ゴルゴタの丘", "ゴルゴダの丘", "カルワリオの丘", "Calvary", "calvary", "Golgotha", "golgotha"],
      url: "https://hazamashobo.github.io/argoda/index.html"
    },
    {
      display: "光輪",
      keywords: ["光輪", "nimbus", "halo"],
      url: "https://hazamashobo.github.io/books/index.html"
    },
    {
      display: "ニンブス",
      keywords: ["ニンブス", "nimbus"],
      url: "https://hazamashobo.github.io/books/index.html"
    },
    {
      display: "光背",
      keywords: ["光背", "背光","頭光","halo"],
      url: "https://hazamashobo.github.io/books/index.html"
    },
    {
      display: "後光",
      keywords: ["後光", "goko", "halo"],
      url: "https://hazamashobo.github.io/books/index.html"
    },
     {
      display: "ヒント",
      keywords: ["ヒント", "hint", "hinto"],
      url: "https://hazamashobo.github.io/hint/index.html"
    },
  ];

  // 🔹 クエリ取得
  const params = new URLSearchParams(window.location.search);
  const rawQuery = params.get("q") || "";
  const query = rawQuery.trim();

  function normalize(s) {
    return s.toLowerCase().replace(/[\s\u3000]/g, "");
  }

  const resultDiv = document.getElementById("result");
  const resultList = document.getElementById("resultList");

  if (!query) {
    resultDiv.textContent = "検索キーワードを入力してください。";
  } else {
    const nq = normalize(query);

    const hits = pages.filter(p =>
      p.keywords.some(k =>
        normalize(k).includes(nq)
      )
    );

    if (hits.length > 0) {
      resultDiv.textContent = `${hits.length}件ヒットしました。`;

      hits.forEach(p => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `<a href="${p.url}">${p.display}</a>`;
        resultList.appendChild(div);
      });
    } else {
      resultDiv.textContent =
        "データが見つかりません。キーワードを変えてお試しください。";
    }
  }
</script>

</body>
</html>
